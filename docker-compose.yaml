# Sign extension stack — Coston2/Coston/local devnet.
#
# The language of the extension-tee container is selected by LANGUAGE in .env
# (go|python|typescript). start-services.sh maps that into EXTENSION_CONTEXT +
# EXTENSION_DOCKERFILE before invoking compose:
#   go         → context "." (this dir); tee-node is fetched from the network.
#   python/ts  → context "../.." (tee/); those Dockerfiles still COPY tee-node
#                from disk to build the server binary + confidential-space cert.
# The defaults below preserve the Go path when the vars are unset (e.g. when
# running compose directly).
#
# Usage:
#   docker compose up -d                                                       # local devnet
#   docker compose -f docker-compose.yaml -f docker-compose.coston.yaml up -d  # Coston
#   docker compose -f docker-compose.yaml -f docker-compose.coston2.yaml up -d # Coston2

services:
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "${REDIS_BIND:-127.0.0.1:6382}:6379"
    tmpfs:
      - /data

  ext-proxy:
    image: ${REGISTRY:-local}/tee-proxy
    volumes:
      - ./config/proxy/extension_proxy.docker.toml:/app/config/config.toml:ro
    environment:
      - PROXY_PRIVATE_KEY=${PROXY_PRIVATE_KEY:-983760a4ebf75b2ac3a93531168a0f225d01e5dc6e3568adbd46233ba1fb4fa4}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${EXT_PROXY_INTERNAL_BIND:-0.0.0.0:6673}:6663"
      - "${EXT_PROXY_EXTERNAL_BIND:-0.0.0.0:6674}:6664"
    depends_on:
      - redis

  extension-tee:
    build:
      context: ${EXTENSION_CONTEXT:-.}
      dockerfile: ${EXTENSION_DOCKERFILE:-Dockerfile}
      args:
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH}
    env_file:
      - path: ./config/extension.env
        required: false
    environment:
      - MODE=${MODE:-1}
      - INITIAL_OWNER=${INITIAL_OWNER:-0xF4E021377420Afe90c1A7D2b8968904946633a64}
      - PROXY_URL=http://ext-proxy:6663
      - CONFIG_PORT=5501
      - SIGN_PORT=7701
      - EXTENSION_PORT=7702
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - ext-proxy

networks:
  default:
    name: ${COMPOSE_NETWORK:-sign-default}
